<html><head></head><body><p>Form containing 8 fields with autocomplete attribute.</p><form>
                   <input id="given-name" autocomplete="given-name" data-moz-autofill-type="given-name">
                   <input id="additional-name" autocomplete="additional-name" data-moz-autofill-type="additional-name">
                   <input id="family-name" autocomplete="family-name" data-moz-autofill-type="family-name">
                   <input id="street-address" autocomplete="street-address" data-moz-autofill-type="street-address">
                   <input id="city" autocomplete="address-level2" data-moz-autofill-type="address-level2">
                   <input id="country" autocomplete="country" data-moz-autofill-type="country">
                   <input id="email" autocomplete="email" data-moz-autofill-type="email">
                   <input id="tel" autocomplete="tel" data-moz-autofill-type="tel">
                   <input id="without-autocomplete-1">
                   <input id="without-autocomplete-2">
                 </form></body></html>
