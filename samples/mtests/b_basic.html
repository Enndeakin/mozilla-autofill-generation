<html><head>
  <meta charset="utf-8">
  <title>Form Autofill Demo Page</title>
</head>
<body><p></p>
  <h1>Form Autofill Demo Page</h1>
  <form id="form">
    <p><label>organization: <input type="text" id="organization" name="organization" autocomplete="organization" data-moz-autofill-type="organization"></label></p>
    <p><label>streetAddress: <input type="text" id="street-address" name="street-address" autocomplete="street-address" data-moz-autofill-type="street-address"></label></p>
    <p><label>addressLevel2: <input type="text" id="address-level2" name="address-level2" autocomplete="address-level2" data-moz-autofill-type="address-level2"></label></p>
    <p><label>addressLevel1: <input type="text" id="address-level1" name="address-level1" autocomplete="address-level1" data-moz-autofill-type="address-level1"></label></p>
    <p><label>postalCode: <input type="text" id="postal-code" name="postal-code" autocomplete="postal-code" data-moz-autofill-type="postal-code"></label></p>
    <p><label>country: <input type="text" id="country" name="country" autocomplete="country" data-moz-autofill-type="country"></label></p>
    <p><label>tel: <input type="text" id="tel" name="tel" autocomplete="tel" data-moz-autofill-type="tel"></label></p>
    <p><label>email: <input type="text" id="email" name="email" autocomplete="email" data-moz-autofill-type="email"></label></p>
    <p><input type="submit"></p>
    <p><button type="reset">Reset</button></p>
  </form>

  <form id="formB">
    <p><label>Organization: <input type="text" data-moz-autofill-type="organization"></label></p>
    <p><label><input type="text" id="B_address-line1" data-moz-autofill-type="address-line1"></label></p>
    <p><label><input type="text" name="address-line2" data-moz-autofill-type="address-line2"></label></p>
    <p><label><input type="text" id="B_address-line3" name="address-line3" data-moz-autofill-type="address-line3"></label></p>
    <p><label>City: <input type="text" name="address-level2" data-moz-autofill-type="address-level2"></label></p>
    <p><label>State: <select id="B_address-level1" data-moz-autofill-type="address-level1"></select></label></p>
    <p><input type="text" id="B_postal-code" name="postal-code" data-moz-autofill-type="postal-code"></p>
    <p><label>Country: <select multiple="" id="B_country" name="country" data-moz-autofill-type="country"></select></label></p>
    <p><label>Telephone: <input id="B_tel" name="tel" data-moz-autofill-type="tel"></label></p>
    <p><label>Email: <input type="text" id="B_email" name="email" data-moz-autofill-type="email"></label></p>
    <hr>
    <p><label>cc-number <input type="text" id="B_cc-number" autocomplete="cc-number" data-moz-autofill-type="cc-number"></label></p>
    <p><label>cc-name <input type="text" id="B_cc-name" autocomplete="cc-name" data-moz-autofill-type="cc-name"></label></p>
    <p><label>cc-exp-month <input type="text" id="B_cc-exp-month" autocomplete="cc-exp-month" data-moz-autofill-type="cc-exp-month"></label></p>
    <p><label>cc-exp-year <input type="text" id="B_cc-exp-year" autocomplete="cc-exp-year" data-moz-autofill-type="cc-exp-year"></label></p>
    <hr>
    <p><input type="submit"></p>
    <p><button type="reset">Reset</button></p>
  </form>

  <form id="formC">
    <p><label><input type="text" name="someprefixAddrLine1" data-moz-autofill-type="address-line1"></label></p>
    <p><label>City: <input type="text" name="address-level2" data-moz-autofill-type="address-level2"></label></p>
    <p><label><input type="text" name="someprefixAddrLine2" data-moz-autofill-type="address-line2"></label></p>
    <p><label>Organization: <input type="text" name="organization" data-moz-autofill-type="organization"></label></p>
    <p><label><input type="text" name="someprefixAddrLine3" data-moz-autofill-type="address-line1"></label></p>
  </form>



</body></html>
