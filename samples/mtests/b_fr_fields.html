<html><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heuristics fr-FR fields test page</title>
</head>

<body><p></p>
  <h1>Heuristics fr-FR fields test page</h1>
  <form name="cardForm">
    <div>
      <input id="cardNumber" autocomplete="off" name="cardNumber" maxlength="19" placeholder="**** **** **** ****" type="tel" value="" data-moz-autofill-type="cc-number">
      <label for="cardNumber">Numéro de carte *</label>
    </div>
    <div>
      <input id="expiry" autocomplete="off" name="expiry" maxlength="5" placeholder="MM/AA" step="1" type="tel" value="" data-moz-autofill-type="cc-exp">
      <label for="expiry">Date d'expiration *</label>
    </div>
    <div>
      <input id="cvc" autocomplete="off" name="cvc" maxlength="3" placeholder="***" step="1" type="tel" value="" data-moz-autofill-type="cc-csc">
      <label for="cvc">Cryptogramme *</label>
    </div>
    <div>
      <input id="name" autocomplete="off" name="name" placeholder="Nom Prénom" step="1" type="text" value="DOE JOHN" data-moz-autofill-type="cc-name">
      <label for="name">Titulaire *</label>
    </div>
  </form>



</body></html>
