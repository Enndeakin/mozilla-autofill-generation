    <br>

    <label>Postal Code: <input id="postal-code-c" autocomplete="section-my postal-code" data-moz-autofill-type="postal-code"></label><br>
    <label>Country: <input id="country-c" autocomplete="section-my country" data-moz-autofill-type="country"></label><br>

    <br>
    <label>Telephone: <input id="tel-a" autocomplete="work tel" data-moz-autofill-type="tel"></label><br>

    <br>
    <label>Telephone: <input id="tel-b" autocomplete="home tel" data-moz-autofill-type="tel"></label><br>
    <label>Email: <input id="email-b" autocomplete="home email" data-moz-autofill-type="email"></label><br>
    <p>
      <input type="submit" value="Submit">
      <button type="reset">Reset</button>
    </p>
  </form>
