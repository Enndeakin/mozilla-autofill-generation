<html><head></head><body><p>Do not update name to cc-name when the previous credit card section contains cc-csc</p><form>
          <input id="cc-number" autocomplete="cc-number" data-moz-autofill-type="cc-number">
          <input id="cc-csc" autocomplete="cc-csc" data-moz-autofill-type="cc-csc">
          <input id="given" placeholder="given-name" data-moz-autofill-type="given-name">
          <input id="family" placeholder="family-name" data-moz-autofill-type="family-name">
          <input id="address" autocomplete="street-address" data-moz-autofill-type="street-address">
          <input id="country" autocomplete="country" data-moz-autofill-type="country">
        </form></body></html>
