<html><head></head><body><p>Update name to cc-name when name is the first field of a credit card section</p><form>
          <input id="given-name" placeholder="given-name" data-moz-autofill-type="cc-given-name">
          <input id="family-name" placeholder="family-name" data-moz-autofill-type="cc-family-name">
          <input id="cc-number" autocomplete="cc-number" data-moz-autofill-type="cc-number">
          <input id="cc-csc" autocomplete="cc-csc" data-moz-autofill-type="cc-csc">          
        </form></body></html>
