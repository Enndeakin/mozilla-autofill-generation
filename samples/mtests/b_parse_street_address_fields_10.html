<html><head></head><body><p>Form containing type='search' with various address types.</p><form>
                  <input id="firstname" autocomplete="firstname" type="search">
                  <label>Last Name: <input id="lastname" data-moz-autofill-type="name"></label>
                  <label>Middle Name: <input id="middlename" type="search"></label>
                  <label>Street Address: <input id="address-line1" type="search" data-moz-autofill-type="address-line1"></label>
                  <input id="address-line2" data-moz-autofill-type="address-line2">
                  <label>City: <input id="address-level2" type="search" data-moz-autofill-type="address-level2"></label>
                  <label>Email: <input id="email" type="search"></label>
                  <input id="phone" data-moz-autofill-type="tel">
                  <label>Postal Code: <input id="postalcode1" type="search" data-moz-autofill-type="postal-code"></label>
                 </form></body></html>
